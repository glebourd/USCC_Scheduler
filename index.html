<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>US Custom Creations Weekly Scheduler</title>
    <!-- React & Babel for Browser Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Core Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap");

        body {
            font-family: "Inter", sans-serif;
            background-color: #f8fafc;
        }

        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        [draggable="true"] {
            cursor: grab;
        }

        [draggable="true"]:active {
            cursor: grabbing;
        }

        /* Animation for selections */
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(-5%) translateX(-50%);
                animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
            }

            50% {
                transform: translateY(0) translateX(-50%);
                animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        /**
         * Robust Icon Component
         * Instead of using lucide-react (which often fails in UMD environments due to React versioning),
         * we use the core lucide library to render SVGs directly.
         */
        const Icon = ({ name, size = 20, className = "", strokeWidth = 2 }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        const svg = iconData.toSvg({
                            width: size,
                            height: size,
                            class: className,
                            "stroke-width": strokeWidth,
                        });
                        iconRef.current.innerHTML = svg;
                    }
                }
            }, [name, size, className, strokeWidth]);

            return (
                <span
                    ref={iconRef}
                    className={`inline-flex items-center justify-center pointer-events-none ${className}`}
                />
            );
        };

        // Create specific components for the app to keep JSX clean
        const Calendar = (p) => <Icon name="calendar" {...p} />;
        const Upload = (p) => <Icon name="upload" {...p} />;
        const Plus = (p) => <Icon name="plus" {...p} />;
        const TrendingUp = (p) => <Icon name="trending-up" {...p} />;
        const ThermometerSnowflake = (p) => (
            <Icon name="thermometer-snowflake" {...p} />
        );
        const CloudRain = (p) => <Icon name="cloud-rain" {...p} />;
        const Wind = (p) => <Icon name="wind" {...p} />;
        const CheckCircle = (p) => <Icon name="check-circle" {...p} />;
        const Truck = (p) => <Icon name="truck" {...p} />;
        const Settings = (p) => <Icon name="settings" {...p} />;
        const List = (p) => <Icon name="list" {...p} />;
        const Zap = (p) => <Icon name="zap" {...p} />;
        const MapPin = (p) => <Icon name="map-pin" {...p} />;
        const Home = (p) => <Icon name="home" {...p} />;
        const Wrench = (p) => <Icon name="wrench" {...p} />;
        const X = (p) => <Icon name="x" {...p} />;
        const Info = (p) => <Icon name="info" {...p} />;
        const AlertTriangle = (p) => <Icon name="alert-triangle" {...p} />;
        const FileText = (p) => <Icon name="file-text" {...p} />;
        const CheckSquare = (p) => <Icon name="check-square" {...p} />;
        const Loader2 = (p) => (
            <Icon
                name="loader-2"
                {...p}
                className={`${p.className || ""} animate-spin`}
            />
        );
        const Search = (p) => <Icon name="search" {...p} />;
        const ExternalLink = (p) => <Icon name="external-link" {...p} />;
        const Trash2 = (p) => <Icon name="trash-2" {...p} />;

        const INITIAL_CREWS = [
            { id: 1, name: "Crew 1 (Lead)", isLead: true, leader: "Alex" },
            { id: 2, name: "Crew 2 (Lead)", isLead: true, leader: "Tyler" },
            { id: 3, name: "Crew 3 (Lead)", isLead: true, leader: "Lead 3" },
            { id: 4, name: "Crew 4 (Helper)", isLead: false, leader: "Helper" },
        ];

        const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri"];

        const App = () => {
            const [crews, setCrews] = useState(INITIAL_CREWS);
            const [backlog, setBacklog] = useState([
                {
                    id: "b1",
                    name: "Miller High-Story Screen",
                    type: "Screen",
                    value: 8500,
                    duration: 2,
                    location: "Cincinnati",
                    subRegion: "North",
                    address: "1200 Mason-Montgomery Rd, Mason, OH",
                    complexity: "Complex",
                    hasElectrical: true,
                    elevation: "2nd Story",
                    materialsReady: true,
                    siteReady: true,
                },
                {
                    id: "b2",
                    name: "Downtown Pergola",
                    type: "Pergola",
                    value: 25000,
                    duration: 4,
                    location: "Louisville",
                    subRegion: "Central",
                    address: "400 Main St, Louisville, KY",
                    complexity: "Complex",
                    hasElectrical: true,
                    elevation: "Ground",
                    materialsReady: true,
                    siteReady: true,
                },
                {
                    id: "b3",
                    name: "Small Repair",
                    type: "Service",
                    value: 450,
                    duration: 1,
                    location: "Louisville",
                    subRegion: "South",
                    address: "9 Dixie Hwy, Louisville, KY",
                    complexity: "Standard",
                    hasElectrical: false,
                    elevation: "Ground",
                    materialsReady: true,
                    siteReady: true,
                },
            ]);

            const [schedule, setSchedule] = useState({});
            const [scheduledJobs, setScheduledJobs] = useState([]);
            const [activeSelection, setActiveSelection] = useState(null);
            const [draggedItem, setDraggedItem] = useState(null);
            const [dragOverCell, setDragOverCell] = useState(null);

            const [weather, setWeather] = useState({
                isFreezing: false,
                isRaining: false,
                isWindy: false,
            });
            const [modals, setModals] = useState({
                add: false,
                import: false,
                settings: false,
            });
            const [importText, setImportText] = useState("");
            const [newJob, setNewJob] = useState({
                name: "",
                value: "",
                duration: 1,
                type: "Screen",
                location: "Louisville",
                subRegion: "Central",
                address: "",
                complexity: "Standard",
                isBuilder: false,
                hasElectrical: false,
                elevation: "Ground",
                materialsReady: false,
                siteReady: false,
            });

            const [suggestions, setSuggestions] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const suggestionRef = useRef(null);
            const searchTimeoutRef = useRef(null);

            const currentTotal = useMemo(
                () => scheduledJobs.reduce((sum, j) => sum + j.value, 0),
                [scheduledJobs],
            );
            const lowValueCount = useMemo(
                () => scheduledJobs.filter((j) => j.value < 3000).length,
                [scheduledJobs],
            );
            const isFluffHeavy = lowValueCount > 5;

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (
                        suggestionRef.current &&
                        !suggestionRef.current.contains(event.target)
                    ) {
                        setShowSuggestions(false);
                    }
                };
                const handleKeyDown = (e) => {
                    if (e.key === "Escape") {
                        setModals({ add: false, import: false, settings: false });
                        setActiveSelection(null);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                window.addEventListener("keydown", handleKeyDown);
                return () => {
                    document.removeEventListener("mousedown", handleClickOutside);
                    window.removeEventListener("keydown", handleKeyDown);
                };
            }, []);

            const fetchSuggestions = async (query) => {
                if (query.length < 3) {
                    setSuggestions([]);
                    return;
                }
                setIsSearching(true);
                try {
                    const response = await fetch(
                        `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5`,
                    );
                    const data = await response.json();
                    const results = data.features.map((f) => {
                        const p = f.properties;
                        const parts = [
                            p.name,
                            p.street,
                            p.city,
                            p.state,
                            p.postcode,
                        ].filter(Boolean);
                        return parts.join(", ");
                    });
                    setSuggestions([...new Set(results)]);
                    setShowSuggestions(true);
                } catch (error) {
                    console.error("Geocoding failed:", error);
                } finally {
                    setIsSearching(false);
                }
            };

            const handleAddressChange = (e) => {
                const val = e.target.value;
                setNewJob({ ...newJob, address: val });
                if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                searchTimeoutRef.current = setTimeout(
                    () => fetchSuggestions(val),
                    300,
                );
            };

            const selectSuggestion = (address) => {
                setNewJob({ ...newJob, address });
                setSuggestions([]);
                setShowSuggestions(false);
            };

            const handleDrop = (e, targetCrewId, targetDayIdx) => {
                e.preventDefault();
                setDragOverCell(null);
                if (!draggedItem) return;

                const { type, job, sourceCrewId, sourceDayIdx } = draggedItem;
                const targetCrew = crews.find((c) => c.id === targetCrewId);

                // 1. Duration Check
                if (targetDayIdx + job.duration > DAYS.length) {
                    alert(
                        `This ${job.duration}-day job won't fit starting on ${DAYS[targetDayIdx]}.`,
                    );
                    setDraggedItem(null);
                    return;
                }

                // 2. Skill Validation (SOP Rule)
                const needsLead =
                    job.complexity === "Complex" ||
                    job.type === "Pergola" ||
                    job.hasElectrical ||
                    job.elevation === "2nd Story";
                if (needsLead && !targetCrew.isLead) {
                    const confirmLead = window.confirm(
                        `SOP WARNING: This job involves ${job.hasElectrical ? "Electrical" : "Complex Carpentry"} which requires a Lead Foreman. Crew ${targetCrew.name} is a helper crew. Proceed anyway?`,
                    );
                    if (!confirmLead) {
                        setDraggedItem(null);
                        return;
                    }
                }

                // 3. Collision Check
                const currentCrewSchedule = schedule[targetCrewId] || {};
                for (let i = 0; i < job.duration; i++) {
                    const existingJobId = currentCrewSchedule[targetDayIdx + i];
                    if (existingJobId && existingJobId !== job.id) {
                        alert("Schedule Conflict: Day is already booked.");
                        setDraggedItem(null);
                        return;
                    }
                }

                const newSchedule = { ...schedule };
                if (type === "board") {
                    const oldCrewDays = { ...newSchedule[sourceCrewId] };
                    for (let i = 0; i < job.duration; i++)
                        delete oldCrewDays[sourceDayIdx + i];
                    newSchedule[sourceCrewId] = oldCrewDays;
                }

                const newCrewDays = { ...(newSchedule[targetCrewId] || {}) };
                for (let i = 0; i < job.duration; i++)
                    newCrewDays[targetDayIdx + i] = job.id;
                newSchedule[targetCrewId] = newCrewDays;

                setSchedule(newSchedule);
                if (type === "backlog") {
                    setScheduledJobs((prev) => [...prev, job]);
                    setBacklog((prev) => prev.filter((j) => j.id !== job.id));
                }
                setDraggedItem(null);
            };

            const removeFromSchedule = (jobId) => {
                const jobToRemove = scheduledJobs.find((j) => j.id === jobId);
                const newSchedule = { ...schedule };
                Object.keys(newSchedule).forEach((crewId) => {
                    const crewDays = { ...newSchedule[crewId] };
                    Object.keys(crewDays).forEach((dayIdx) => {
                        if (crewDays[dayIdx] === jobId) delete crewDays[dayIdx];
                    });
                    newSchedule[crewId] = crewDays;
                });
                setSchedule(newSchedule);
                setScheduledJobs((prev) => prev.filter((j) => j.id !== jobId));
                if (jobToRemove) setBacklog((prev) => [...prev, jobToRemove]);
            };

            const handleBulkImport = () => {
                if (!importText.trim()) return;
                const rows = importText.split("\n");
                const imported = rows
                    .map((row) => {
                        const cols = row.split("\t");
                        if (cols.length < 2) return null;
                        const name = cols[0].trim();
                        if (!name) return null;
                        const value = parseFloat(cols[1]?.replace(/[^0-9.]/g, "")) || 0;
                        const address = cols[5] || "";

                        const isNorth =
                            address.toLowerCase().includes("mason") ||
                            address.toLowerCase().includes("west chester") ||
                            address.toLowerCase().includes("north");
                        const isComplex =
                            name.toLowerCase().includes("pergola") ||
                            name.toLowerCase().includes("usi") ||
                            name.toLowerCase().includes("fan") ||
                            name.toLowerCase().includes("electric");

                        return {
                            id: "j-" + Math.random().toString(36).substr(2, 9),
                            name,
                            value,
                            duration: parseInt(cols[2]) || 3,
                            type: name.toLowerCase().includes("pergola")
                                ? "Pergola"
                                : name.toLowerCase().includes("service")
                                    ? "Service"
                                    : "Screen",
                            location: address.toLowerCase().includes("ky")
                                ? "Louisville"
                                : "Cincinnati",
                            subRegion: isNorth ? "North" : "Central",
                            address,
                            complexity: isComplex ? "Complex" : "Standard",
                            hasElectrical:
                                name.toLowerCase().includes("fan") ||
                                name.toLowerCase().includes("electric"),
                            isBuilder:
                                cols[7] && cols[7].toLowerCase().includes("yes")
                                    ? true
                                    : false,
                            elevation: "Ground",
                            materialsReady: true,
                            siteReady: true,
                        };
                    })
                    .filter(Boolean);

                setBacklog((prev) => [...prev, ...imported]);
                setModals({ ...modals, import: false });
                setImportText("");
            };

            const openInMaps = (address) => {
                if (!address) return;
                window.open(
                    `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`,
                    "_blank",
                );
            };

            return (
                <div className="min-h-screen p-4 lg:p-8 max-w-[1600px] mx-auto bg-slate-50 text-slate-900">
                    {/* Header Section */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h1 className="text-3xl font-black text-slate-900 tracking-tighter uppercase flex items-center gap-3">
                                <Calendar size={32} className="text-blue-600" />
                                US Custom Creations <span className="text-blue-600">Weekly Scheduler</span>
                            </h1>
                            <p className="text-slate-500 font-medium text-sm mt-1 italic">
                                SOP Rules: Skill Matching, Cincinnati North Buffers, and
                                Weekly $45k Target Tracking.
                            </p>
                        </div>
                        <div className="flex gap-2">
                            <button
                                onClick={() => setModals({ ...modals, import: true })}
                                className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-bold text-xs flex items-center gap-2 transition-all shadow-md active:scale-95"
                            >
                                <Upload size={16} /> IMPORT BUILDERTREND DATA
                            </button>
                            <button
                                onClick={() => setModals({ ...modals, add: true })}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold text-xs flex items-center gap-2 transition-all shadow-md active:scale-95"
                            >
                                <Plus size={16} /> NEW JOB
                            </button>
                        </div>
                    </div>

                    {/* Metric Dashboard */}
                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8">
                        <div className="md:col-span-4 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    Weekly Production Goal
                                </span>
                                <TrendingUp size={18} className="text-emerald-500" />
                            </div>
                            <div className="text-4xl font-black text-slate-800">
                                ${currentTotal.toLocaleString()}
                            </div>
                            <div className="mt-4 h-3 w-full bg-slate-100 rounded-full overflow-hidden">
                                <div
                                    className={`h-full transition-all duration-700 ${currentTotal >= 45000 ? "bg-emerald-500" : "bg-blue-600"}`}
                                    style={{
                                        width: `${Math.min((currentTotal / 45000) * 100, 100)}%`,
                                    }}
                                />
                            </div>
                            <div className="flex justify-between mt-2 text-[10px] font-black uppercase tracking-widest text-slate-400">
                                <span>Target: $45k</span>
                                <span
                                    className={currentTotal >= 45000 ? "text-emerald-500" : ""}
                                >
                                    {Math.round((currentTotal / 45000) * 100)}%
                                </span>
                            </div>
                            {isFluffHeavy && (
                                <div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-xl flex items-center gap-3 text-amber-700">
                                    <AlertTriangle size={18} />
                                    <span className="text-[10px] font-black uppercase leading-tight">
                                        Mix Warning: High density of low-value jobs.
                                    </span>
                                </div>
                            )}
                        </div>

                        <div className="md:col-span-5 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-4">
                                Weather Dependencies
                            </span>
                            <div className="grid grid-cols-3 gap-3">
                                {[
                                    {
                                        key: "isFreezing",
                                        label: "15°F Rule",
                                        icon: <ThermometerSnowflake size={28} />,
                                        color: "bg-red-500",
                                    },
                                    {
                                        key: "isRaining",
                                        label: "Rain Alert",
                                        icon: <CloudRain size={28} />,
                                        color: "bg-blue-500",
                                    },
                                    {
                                        key: "isWindy",
                                        label: "High Wind",
                                        icon: <Wind size={28} />,
                                        color: "bg-teal-500",
                                    },
                                ].map((w) => (
                                    <button
                                        key={w.key}
                                        onClick={() =>
                                            setWeather({ ...weather, [w.key]: !weather[w.key] })
                                        }
                                        className={`p-5 rounded-3xl flex flex-col justify-center items-center text-center gap-3 border-2 transition-all min-h-[110px] ${weather[w.key] ? `${w.color} text-white border-transparent shadow-lg scale-105` : "bg-slate-50 text-slate-400 border-slate-100 hover:border-slate-300 hover:bg-slate-100 hover:text-slate-700"}`}
                                    >
                                        {w.icon}
                                        <span className="text-xs font-black uppercase tracking-tight">
                                            {w.label}
                                        </span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="md:col-span-3 bg-slate-900 p-6 rounded-[2rem] shadow-xl flex flex-col justify-between">
                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                Active Fleet Monitor
                            </span>
                            <div className="space-y-3 my-4">
                                <div className="flex items-center gap-2 text-[10px] font-bold text-slate-300">
                                    <CheckCircle size={14} className="text-emerald-500" /> Lead
                                    Foremen Ready
                                </div>
                                <div className="flex items-center gap-2 text-[10px] font-bold text-slate-300">
                                    <Truck size={14} className="text-blue-500" /> Cincy North
                                    Traffic Active
                                </div>
                            </div>
                            <button
                                onClick={() => setModals({ ...modals, settings: true })}
                                className="w-full py-2.5 bg-slate-800 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-700 transition-colors border border-slate-700"
                            >
                                Crew Management
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        {/* Job Queue Column */}
                        <div className="lg:col-span-3 space-y-4">
                            <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-[650px]">
                                <div className="p-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                                    <h3 className="font-black text-xs uppercase tracking-widest text-slate-600 flex items-center gap-2">
                                        <List size={16} className="text-blue-500" /> Job Backlog
                                    </h3>
                                    <span className="bg-slate-200 text-slate-600 px-2 py-0.5 rounded text-[10px] font-black tracking-widest">
                                        {backlog.length}
                                    </span>
                                </div>
                                <div className="p-4 overflow-y-auto space-y-3 flex-1">
                                    {backlog.map((job) => (
                                        <div
                                            key={job.id}
                                            draggable={true}
                                            onDragStart={(e) => {
                                                setDraggedItem({ type: "backlog", job });
                                                setActiveSelection(null);
                                            }}
                                            onDragEnd={() => setDraggedItem(null)}
                                            onClick={() =>
                                                setActiveSelection(
                                                    activeSelection?.id === job.id ? null : job,
                                                )
                                            }
                                            className={`p-4 rounded-2xl border-2 transition-all cursor-pointer relative group ${activeSelection?.id === job.id ? "border-blue-500 bg-blue-50 shadow-md ring-4 ring-blue-50" : "bg-white border-slate-100 hover:border-blue-200 shadow-sm"} ${draggedItem?.job?.id === job.id ? "opacity-50" : "opacity-100"}`}
                                        >
                                            <div className="flex justify-between items-start mb-1 gap-2">
                                                <span className="font-black text-sm uppercase tracking-tight text-slate-800 leading-tight pr-2">
                                                    {job.name}
                                                </span>
                                                {job.hasElectrical && (
                                                    <Zap
                                                        size={16}
                                                        className="text-amber-500 shrink-0"
                                                        fill="currentColor"
                                                    />
                                                )}
                                            </div>

                                            {/* Address Geocoding Display from previous logic */}
                                            {job.address && (
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        openInMaps(job.address);
                                                    }}
                                                    className="text-[10px] text-blue-500 font-bold mb-2 flex flex-col items-start gap-1 hover:underline truncate w-full pr-4 uppercase tracking-tighter text-left"
                                                >
                                                    <span className="flex items-center text-xs">
                                                        <MapPin
                                                            size={14}
                                                            className="inline mr-1 shrink-0"
                                                        />
                                                        {job.address}
                                                    </span>
                                                </button>
                                            )}

                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter mb-4 flex items-center gap-1">
                                                {job.location} • {job.subRegion}
                                            </div>
                                            <div className="flex justify-between items-end">
                                                <div className="bg-slate-900 text-white px-3.5 py-1.5 rounded-lg text-sm font-black">
                                                    ${job.value.toLocaleString()}
                                                </div>
                                                <div className="text-xs font-black text-blue-600 uppercase bg-blue-100 px-2.5 py-1 rounded tracking-tighter flex items-center">
                                                    {job.duration} DAYS
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {backlog.length === 0 && (

                                    Staging Job Placement
                                </span>
                                <span className="font-black text-base uppercase tracking-tight">
                                    {activeSelection.name} ({activeSelection.duration}D)
                                </span>
                            </div>
                            <div className="h-10 w-px bg-slate-700" />
                            <div className="flex items-center gap-2 text-xs font-bold text-blue-400 italic">
                                Click a crew "+" slot to assign
                            </div>
                            <button
                                onClick={() => setActiveSelection(null)}
                                className="bg-slate-800 hover:bg-red-600 p-2 rounded-full transition-all group"
                            >
                                <X
                                    size={20}
                                    className="group-hover:rotate-90 transition-transform"
                                />
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
