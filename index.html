<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Custom Creations Weekly Scheduler</title>
    <!-- React & Babel for Browser Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Core Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }

        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        [draggable="true"] {
            cursor: grab;
        }

        [draggable="true"]:active {
            cursor: grabbing;
        }

        /* Animation for selections */
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(-5%) translateX(-50%);
                animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
            }

            50% {
                transform: translateY(0) translateX(-50%);
                animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        /**
         * Robust Icon Component
         * Instead of using lucide-react (which often fails in UMD environments due to React versioning),
         * we use the core lucide library to render SVGs directly.
         */
        const Icon = ({ name, size = 20, className = "", strokeWidth = 2 }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        const svg = iconData.toSvg({
                            width: size,
                            height: size,
                            class: className,
                            'stroke-width': strokeWidth
                        });
                        iconRef.current.innerHTML = svg;
                    }
                }
            }, [name, size, className, strokeWidth]);

            return <span ref={iconRef} className="inline-flex items-center justify-center pointer-events-none" />;
        };

        // Create specific components for the app to keep JSX clean
        const Users = (p) => <Icon name="users" {...p} />;
        const DollarSign = (p) => <Icon name="dollar-sign" {...p} />;
        const CloudRain = (p) => <Icon name="cloud-rain" {...p} />;
        const Plus = (p) => <Icon name="plus" {...p} />;
        const Trash2 = (p) => <Icon name="trash-2" {...p} />;
        const AlertTriangle = (p) => <Icon name="alert-triangle" {...p} />;
        const CheckCircle = (p) => <Icon name="check-circle" {...p} />;
        const Clock = (p) => <Icon name="clock" {...p} />;
        const MapPin = (p) => <Icon name="map-pin" {...p} />;
        const X = (p) => <Icon name="x" {...p} />;
        const Info = (p) => <Icon name="info" {...p} />;
        const ThermometerSnowflake = (p) => <Icon name="thermometer-snowflake" {...p} />;
        const Settings = (p) => <Icon name="settings" {...p} />;
        const ChevronRight = (p) => <Icon name="chevron-right" {...p} />;
        const ExternalLink = (p) => <Icon name="external-link" {...p} />;
        const Loader2 = (p) => <Icon name="loader-2" {...p} className={`${p.className} animate-spin`} />;
        const Search = (p) => <Icon name="search" {...p} />;
        const Wind = (p) => <Icon name="wind" {...p} />;
        const Upload = (p) => <Icon name="upload" {...p} />;
        const FileText = (p) => <Icon name="file-text" {...p} />;
        const CheckSquare = (p) => <Icon name="check-square" {...p} />;

        const INITIAL_CREWS = [
            { id: 1, name: 'Crew 1', isLead: true },
            { id: 2, name: 'Crew 2', isLead: true },
            { id: 3, name: 'Crew 3', isLead: true },
            { id: 4, name: 'Crew 4', isLead: false },
        ];

        const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];

        const App = () => {
            const [crews, setCrews] = useState(INITIAL_CREWS);
            const [backlog, setBacklog] = useState([
                { id: 'b1', name: 'Smith Residence', type: 'USI', value: 12500, duration: 3, location: 'Louisville', address: '123 Main St, Louisville, KY', complexity: 'Complex', elevation: 'Ground', materialsReady: true, siteReady: true },
                { id: 'b2', name: 'Jones Patio', type: 'Screen', value: 3200, duration: 1, location: 'Cincinnati', address: '456 Oak Rd, Cincinnati, OH', complexity: 'Standard', elevation: 'Ground', materialsReady: true, siteReady: true },
                { id: 'b3', name: 'Riverside Builder', type: 'Screen', value: 6500, duration: 2, location: 'Cincinnati', address: '789 River Ave, Cincinnati, OH', complexity: 'Standard', isBuilder: true, elevation: 'Ground', materialsReady: true, siteReady: true },
            ]);

            const [schedule, setSchedule] = useState({});
            const [scheduledJobs, setScheduledJobs] = useState([]);
            const [activeSelection, setActiveSelection] = useState(null);

            const [draggedItem, setDraggedItem] = useState(null);
            const [dragOverCell, setDragOverCell] = useState(null);

            const [isFreezing, setIsFreezing] = useState(false);
            const [isRaining, setIsRaining] = useState(false);
            const [isWindy, setIsWindy] = useState(false);

            const [showAddModal, setShowAddModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            const [showCrewSettings, setShowCrewSettings] = useState(false);
            const [importText, setImportText] = useState('');

            const [newJob, setNewJob] = useState({
                name: '', value: '', duration: 1, type: 'USI',
                location: 'Louisville', address: '', complexity: 'Standard',
                isBuilder: false, elevation: 'Ground',
                materialsReady: false, siteReady: false
            });

            const [suggestions, setSuggestions] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const suggestionRef = useRef(null);
            const searchTimeoutRef = useRef(null);

            const currentTotal = useMemo(() => scheduledJobs.reduce((sum, j) => sum + j.value, 0), [scheduledJobs]);

            const getValueShading = (value) => {
                if (value >= 10000) return 'bg-emerald-600 text-white border-emerald-700 shadow-emerald-100 ring-2 ring-emerald-100';
                if (value >= 5000) return 'bg-blue-600 text-white border-blue-700';
                return 'bg-slate-100 text-slate-600 border-slate-200';
            };

            const getBlockStyles = (value, hasRisks, isBuilder) => {
                if (hasRisks) return { bg: 'bg-red-50 border-red-300', accent: 'bg-red-500', text: 'text-red-900', lightText: 'text-red-700' };
                if (value >= 10000) return { bg: 'bg-emerald-50 border-emerald-300', accent: 'bg-emerald-500', text: 'text-emerald-900', lightText: 'text-emerald-700' };
                if (value >= 5000) return { bg: 'bg-blue-50 border-blue-300', accent: 'bg-blue-500', text: 'text-blue-900', lightText: 'text-blue-700' };
                if (isBuilder) return { bg: 'bg-purple-50 border-purple-300', accent: 'bg-purple-400', text: 'text-purple-900', lightText: 'text-purple-700' };
                return { bg: 'bg-slate-50 border-slate-300', accent: 'bg-slate-400', text: 'text-slate-800', lightText: 'text-slate-500' };
            };

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (suggestionRef.current && !suggestionRef.current.contains(event.target)) {
                        setShowSuggestions(false);
                    }
                };
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        setShowAddModal(false);
                        setShowImportModal(false);
                        setShowCrewSettings(false);
                        setActiveSelection(null);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                window.addEventListener('keydown', handleKeyDown);
                return () => {
                    document.removeEventListener('mousedown', handleClickOutside);
                    window.removeEventListener('keydown', handleKeyDown);
                };
            }, []);

            const fetchSuggestions = async (query) => {
                if (query.length < 3) {
                    setSuggestions([]);
                    return;
                }
                setIsSearching(true);
                try {
                    const response = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5`);
                    const data = await response.json();
                    const results = data.features.map(f => {
                        const p = f.properties;
                        const parts = [p.name, p.street, p.city, p.state, p.postcode].filter(Boolean);
                        return parts.join(', ');
                    });
                    setSuggestions([...new Set(results)]);
                    setShowSuggestions(true);
                } catch (error) {
                    console.error("Geocoding failed:", error);
                } finally {
                    setIsSearching(false);
                }
            };

            const handleAddressChange = (e) => {
                const val = e.target.value;
                setNewJob({ ...newJob, address: val });
                if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                searchTimeoutRef.current = setTimeout(() => fetchSuggestions(val), 300);
            };

            const selectSuggestion = (address) => {
                setNewJob({ ...newJob, address });
                setSuggestions([]);
                setShowSuggestions(false);
            };

            // --- DRAG AND DROP HANDLERS ---
            const handleDragStartBacklog = (e, job) => {
                setDraggedItem({ type: 'backlog', job });
                setActiveSelection(null);
                e.dataTransfer.effectAllowed = 'copyMove';
            };

            const handleDragStartBoard = (e, job, crewId, dayIdx) => {
                setDraggedItem({ type: 'board', job, sourceCrewId: crewId, sourceDayIdx: dayIdx });
                e.dataTransfer.effectAllowed = 'move';
            };

            const handleDragEnd = () => {
                setDraggedItem(null);
                setDragOverCell(null);
            };

            const handleDrop = (e, targetCrewId, targetDayIdx) => {
                e.preventDefault();
                setDragOverCell(null);
                if (!draggedItem) return;

                const { type, job, sourceCrewId, sourceDayIdx } = draggedItem;
                const duration = job.duration;

                if (targetDayIdx + duration > DAYS.length) {
                    alert(`This ${duration}-day job won't fit starting on ${DAYS[targetDayIdx]}.`);
                    handleDragEnd();
                    return;
                }

                const currentCrewSchedule = schedule[targetCrewId] || {};
                let collision = false;
                for (let i = 0; i < duration; i++) {
                    const existingJobId = currentCrewSchedule[targetDayIdx + i];
                    if (existingJobId && existingJobId !== job.id) {
                        collision = true;
                        break;
                    }
                }

                if (collision) {
                    alert("One of the required days is already booked for this crew.");
                    handleDragEnd();
                    return;
                }

                const newSchedule = { ...schedule };

                if (type === 'board') {
                    const oldCrewDays = { ...newSchedule[sourceCrewId] };
                    for (let i = 0; i < duration; i++) {
                        delete oldCrewDays[sourceDayIdx + i];
                    }
                    newSchedule[sourceCrewId] = oldCrewDays;
                }

                const newCrewDays = { ...(newSchedule[targetCrewId] || {}) };
                for (let i = 0; i < duration; i++) {
                    newCrewDays[targetDayIdx + i] = job.id;
                }
                newSchedule[targetCrewId] = newCrewDays;

                setSchedule(newSchedule);

                if (type === 'backlog') {
                    setScheduledJobs(prev => [...prev, job]);
                    setBacklog(prev => prev.filter(j => j.id !== job.id));
                }

                handleDragEnd();
            };

            const handleSlotClick = (crewId, startDayIdx) => {
                if (!activeSelection) return;
                const mockEvent = { preventDefault: () => { } };
                setDraggedItem({ type: 'backlog', job: activeSelection });
                setTimeout(() => {
                    handleDrop(mockEvent, crewId, startDayIdx);
                    setActiveSelection(null);
                }, 0);
            };

            const removeFromSchedule = (jobId) => {
                const jobToRemove = scheduledJobs.find(j => j.id === jobId);
                if (!jobToRemove) return;
                const newSchedule = { ...schedule };
                Object.keys(newSchedule).forEach(crewId => {
                    const crewDays = { ...newSchedule[crewId] };
                    Object.keys(crewDays).forEach(dayIdx => {
                        if (crewDays[dayIdx] === jobId) delete crewDays[dayIdx];
                    });
                    newSchedule[crewId] = crewDays;
                });
                setSchedule(newSchedule);
                setScheduledJobs(prev => prev.filter(j => j.id !== jobId));
                setBacklog(prev => [...prev, jobToRemove]);
            };

            const handleAddJob = (e) => {
                e.preventDefault();
                if (!newJob.materialsReady || (newJob.isBuilder && !newJob.siteReady)) {
                    alert("Please complete SOP readiness verification.");
                    return;
                }
                const id = crypto.randomUUID();
                setBacklog([...backlog, { ...newJob, id, value: parseFloat(newJob.value) || 0, duration: parseInt(newJob.duration) || 1 }]);
                setShowAddModal(false);
                setNewJob({ name: '', value: '', duration: 1, type: 'USI', location: 'Louisville', address: '', complexity: 'Standard', isBuilder: false, elevation: 'Ground', materialsReady: false, siteReady: false });
            };

            const handleBulkImport = () => {
                if (!importText.trim()) return;
                const rows = importText.split('\n');
                const importedJobs = [];

                rows.forEach(row => {
                    const cols = row.split('\t');
                    if (cols.length >= 2 && cols[0].trim() !== '') {
                        const rawValue = cols[1] || '0';
                        const parsedValue = parseFloat(rawValue.replace(/[^0-9.]/g, '')) || 0;

                        importedJobs.push({
                            id: crypto.randomUUID(),
                            name: cols[0].trim(),
                            value: parsedValue,
                            duration: parseInt(cols[2]) || 3,
                            type: cols[3] || 'Screen',
                            location: cols[4] || 'Louisville',
                            address: cols[5] || '',
                            complexity: cols[6] || 'Standard',
                            isBuilder: (cols[7] && cols[7].toLowerCase().includes('yes')) ? true : false,
                            elevation: 'Ground',
                            materialsReady: true,
                            siteReady: true
                        });
                    }
                });

                if (importedJobs.length > 0) {
                    setBacklog(prev => [...prev, ...importedJobs]);
                    setShowImportModal(false);
                    setImportText('');
                } else {
                    alert("Could not parse data. Ensure it is tab-separated.");
                }
            };

            const updateCrew = (id, field, value) => {
                setCrews(crews.map(c => c.id === id ? { ...c, [field]: value } : c));
            };

            const openInMaps = (address) => {
                if (!address) return;
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`, '_blank');
            };

            const getCrewProduction = (crewId) => {
                const crewSchedule = schedule[crewId] || {};
                const uniqueJobIds = [...new Set(Object.values(crewSchedule))];
                return uniqueJobIds.reduce((sum, jobId) => {
                    const job = scheduledJobs.find(j => j.id === jobId);
                    return sum + (job ? job.value : 0);
                }, 0);
            };

            return (
                <div className="min-h-screen p-4 lg:p-8">
                    {/* APP HEADER */}
                    <div className="max-w-[1600px] mx-auto mb-6">
                        <h1 className="text-2xl lg:text-3xl font-black text-slate-900 uppercase tracking-tighter">
                            US Custom Creations <span className="text-blue-600">Weekly Scheduler</span>
                        </h1>
                        <p className="text-slate-500 text-sm font-medium mt-1 max-w-3xl">
                            Manage the weekly "Tetris" of scheduling to hit the $45,000 production target.
                            Prioritize cash flow, balance lead crew loads ($20k/crew), and strictly enforce SOP rules. Drag and drop jobs to schedule.
                        </p>
                    </div>

                    {/* METRICS & CONTROLS */}
                    <div className="max-w-[1600px] mx-auto mb-8 grid grid-cols-1 md:grid-cols-12 gap-4">
                        <div className="md:col-span-5 bg-white p-5 rounded-2xl shadow-md border border-slate-200">
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest">Global Production Total</span>
                                <DollarSign size={16} className="text-emerald-500" />
                            </div>
                            <div className="text-3xl font-black text-slate-800">${currentTotal.toLocaleString()}</div>
                            <div className="mt-3 h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                <div className={`h-full transition-all duration-1000 ${currentTotal >= 45000 ? 'bg-emerald-500' : 'bg-blue-600'}`} style={{ width: `${Math.min((currentTotal / 45000) * 100, 100)}%` }} />
                            </div>
                            <div className="flex justify-between mt-2 text-[10px] font-black uppercase tracking-tighter">
                                <span className="text-slate-400">Target: $45,000</span>
                                <span className={currentTotal >= 45000 ? 'text-emerald-600' : 'text-blue-600'}>{Math.round((currentTotal / 45000) * 100)}%</span>
                            </div>
                        </div>

                        <div className="md:col-span-4 grid grid-cols-2 gap-2 text-slate-900">
                            <div className="bg-white p-3 rounded-2xl shadow-md border border-slate-200 flex flex-col justify-center gap-2">
                                <button onClick={() => setIsFreezing(!isFreezing)} className={`flex items-center justify-between px-3 py-3 rounded-xl font-black text-[10px] border transition-all ${isFreezing ? 'bg-red-600 text-white border-red-600 shadow-lg' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                    <div className="flex items-center gap-2"><ThermometerSnowflake size={14} /><span>15°F RULE</span></div>
                                    <div className={`w-6 h-3 rounded-full relative transition-colors ${isFreezing ? 'bg-red-400' : 'bg-slate-300'}`}><div className={`absolute top-0.5 w-2 h-2 rounded-full bg-white transition-all ${isFreezing ? 'right-0.5' : 'left-0.5'}`} /></div>
                                </button>
                                <button onClick={() => setIsRaining(!isRaining)} className={`flex items-center justify-between px-3 py-3 rounded-xl font-black text-[10px] border transition-all ${isRaining ? 'bg-blue-600 text-white border-blue-600 shadow-lg' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                    <div className="flex items-center gap-2"><CloudRain size={14} /><span>RAIN ALERT</span></div>
                                    <div className={`w-6 h-3 rounded-full relative transition-colors ${isRaining ? 'bg-blue-400' : 'bg-slate-300'}`}><div className={`absolute top-0.5 w-2 h-2 rounded-full bg-white transition-all ${isRaining ? 'right-0.5' : 'left-0.5'}`} /></div>
                                </button>
                            </div>
                            <div className="bg-white p-3 rounded-2xl shadow-md border border-slate-200 flex flex-col justify-center">
                                <button onClick={() => setIsWindy(!isWindy)} className={`flex items-center justify-between px-3 py-4 rounded-xl font-black text-xs border transition-all h-full ${isWindy ? 'bg-teal-600 text-white border-teal-600 shadow-lg' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                    <div className="flex items-center gap-2"><Wind size={16} /><span>HIGH WIND</span></div>
                                    <div className={`w-8 h-4 rounded-full relative transition-colors ${isWindy ? 'bg-teal-400' : 'bg-slate-300'}`}><div className={`absolute top-1 w-2 h-2 rounded-full bg-white transition-all ${isWindy ? 'right-1' : 'left-1'}`} /></div>
                                </button>
                            </div>
                        </div>

                        <div className="md:col-span-3 grid grid-cols-2 grid-rows-2 gap-2">
                            <button onClick={() => setShowImportModal(true)} className="col-span-2 bg-emerald-600 text-white rounded-xl font-black text-[11px] flex items-center justify-center gap-2 hover:bg-emerald-700 shadow-md py-3 uppercase tracking-tighter">
                                <Upload size={16} /> Import BuilderTrend data
                            </button>
                            <button onClick={() => setShowAddModal(true)} className="bg-blue-600 text-white rounded-xl font-black text-[10px] flex items-center justify-center gap-1.5 hover:bg-blue-700 shadow-md py-3 uppercase">
                                <Plus size={14} /> Manual Job
                            </button>
                            <button onClick={() => setShowCrewSettings(!showCrewSettings)} className="bg-slate-800 text-white rounded-xl font-black text-[10px] flex items-center justify-center gap-1.5 hover:bg-black shadow-md py-3 uppercase">
                                <Settings size={14} /> Crews
                            </button>
                        </div>
                    </div>

                    <div className="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* BACKLOG */}
                        <div className="lg:col-span-3 space-y-6">
                            {showCrewSettings && (
                                <div className="bg-slate-800 text-white p-5 rounded-2xl shadow-xl">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-black text-sm uppercase tracking-widest">Crew Config</h3>
                                        <button onClick={() => setShowCrewSettings(false)} className="p-1 hover:bg-slate-700 rounded-full transition-colors"><X size={16} /></button>
                                    </div>
                                    <div className="space-y-4 max-h-[50vh] overflow-y-auto pr-1">
                                        {crews.map(crew => (
                                            <div key={crew.id} className="p-3 bg-slate-700 rounded-xl space-y-2 border border-slate-600 text-slate-900">
                                                <input className="bg-transparent border-b border-slate-500 w-full font-bold text-sm focus:outline-none focus:border-blue-400 pb-1 text-white" value={crew.name} onChange={(e) => updateCrew(crew.id, 'name', e.target.value)} />
                                                <label className="flex items-center gap-2 cursor-pointer pt-1 text-white">
                                                    <input type="checkbox" checked={crew.isLead} onChange={(e) => updateCrew(crew.id, 'isLead', e.target.checked)} className="w-4 h-4 rounded text-blue-500 bg-slate-800" />
                                                    <span className="text-[10px] font-black uppercase opacity-80">Lead Foreman</span>
                                                </label>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden flex flex-col max-h-[75vh]">
                                <div className="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center text-slate-800">
                                    <h3 className="font-black text-sm flex items-center gap-2 tracking-tight"><Clock size={16} className="text-blue-600" /> JOB BACKLOG</h3>
                                    <span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-black tracking-widest">{backlog.length}</span>
                                </div>
                                <div className="p-4 overflow-y-auto space-y-3 bg-slate-50/20 flex-1">
                                    {backlog.map(job => (
                                        <div key={job.id} draggable={true} onDragStart={(e) => handleDragStartBacklog(e, job)} onDragEnd={handleDragEnd} onClick={() => setActiveSelection(activeSelection?.id === job.id ? null : job)} className={`p-4 rounded-2xl border-2 transition-all group relative overflow-hidden ${activeSelection?.id === job.id ? 'border-blue-500 bg-blue-50 ring-4 ring-blue-50' : 'border-slate-100 bg-white hover:border-blue-200 shadow-sm'} ${draggedItem?.job?.id === job.id ? 'opacity-50' : 'opacity-100'}`}>
                                            <div className="flex justify-between items-start mb-2 text-slate-900">
                                                <span className="font-black text-sm uppercase tracking-tighter line-clamp-1 pr-2">{job.name}</span>
                                                {job.isBuilder && <span className="text-[8px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded font-black uppercase tracking-tighter shrink-0">Builder</span>}
                                            </div>
                                            {job.address && (
                                                <button onClick={(e) => { e.stopPropagation(); openInMaps(job.address); }} className="text-[10px] text-blue-500 font-bold mb-2 flex items-center gap-1 hover:underline truncate w-full pr-4 uppercase tracking-tighter text-left">
                                                    <MapPin size={10} className="inline mr-1" />{job.address} <ExternalLink size={8} className="inline" />
                                                </button>
                                            )}
                                            <div className="flex items-center gap-3 text-[10px] font-bold text-slate-400 mb-3 uppercase">
                                                <span className="font-black text-blue-600">{job.duration} DAYS</span>
                                                <span>{job.location}</span>
                                            </div>
                                            <div className="flex justify-between items-end">
                                                <div className={`px-3 py-1 rounded-lg text-sm font-black border ${getValueShading(job.value)}`}>
                                                    ${job.value.toLocaleString()}
                                                </div>
                                                <div className="text-[10px] font-bold text-slate-300 group-hover:text-blue-400 transition-colors uppercase">Drag to Schedule</div>
                                            </div>
                                        </div>
                                    ))}
                                    {backlog.length === 0 && <div className="text-center py-8 text-slate-400 text-xs italic font-bold uppercase tracking-widest">Queue is empty.</div>}
                                </div>
                            </div>
                        </div>

                        {/* SCHEDULE GRID */}
                        <div className="lg:col-span-9">
                            <div className="bg-white rounded-3xl shadow-2xl border border-slate-300 overflow-hidden">
                                <div className="grid grid-cols-6 border-b border-slate-200 bg-slate-800">
                                    <div className="p-4 border-r border-slate-700" />
                                    {DAYS.map(day => (
                                        <div key={day} className="p-4 text-center text-xs font-black text-slate-100 uppercase tracking-[0.2em]">{day}</div>
                                    ))}
                                </div>
                                <div className="flex flex-col text-slate-900">
                                    {crews.map(crew => {
                                        const crewProd = getCrewProduction(crew.id);
                                        const targetReached = crewProd >= 20000;
                                        return (
                                            <div key={crew.id} className="grid grid-cols-6 border-b border-slate-100 last:border-0 min-h-[160px]">
                                                <div className="p-4 border-r border-slate-100 bg-slate-100 flex flex-col justify-center">
                                                    <div className="font-black text-slate-800 text-sm uppercase leading-tight">{crew.name}</div>
                                                    <div className={`text-[9px] mt-1 font-black uppercase tracking-widest ${crew.isLead ? 'text-blue-600' : 'text-slate-400'}`}>
                                                        {crew.isLead ? 'Lead Foreman' : 'Helper Crew'}
                                                    </div>
                                                    {crew.isLead && (
                                                        <div className="mt-4 pt-3 border-t border-slate-200">
                                                            <div className="flex justify-between text-[8px] font-black uppercase mb-1 text-slate-500 tracking-tighter">
                                                                <span>Target: $20k</span>
                                                                <span className={targetReached ? 'text-emerald-600' : 'text-blue-600'}>${(crewProd / 1000).toFixed(1)}k</span>
                                                            </div>
                                                            <div className="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
                                                                <div className={`h-full transition-all ${targetReached ? 'bg-emerald-500' : 'bg-blue-500'}`} style={{ width: `${Math.min((crewProd / 20000) * 100, 100)}%` }} />
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                                {DAYS.map((day, dayIdx) => {
                                                    const jobId = schedule[crew.id]?.[dayIdx];
                                                    const job = jobId ? scheduledJobs.find(j => j.id === jobId) : null;
                                                    if (job && schedule[crew.id]?.[dayIdx - 1] === jobId) return null;

                                                    let builderRisk = null;
                                                    if (job && job.isBuilder) {
                                                        const prevJobId = schedule[crew.id]?.[dayIdx - 1];
                                                        const prevJob = prevJobId ? scheduledJobs.find(j => j.id === prevJobId) : null;
                                                        if (prevJob && prevJob.isBuilder && prevJob.id !== job.id) builderRisk = "Cash Flow: B2B Builder";
                                                    }

                                                    const risks = job ? [
                                                        (isFreezing ? "Temp Lock (<15°F)" : null),
                                                        (isRaining && (job.type === 'USI' || job.type === 'Pergola') ? "Rain Risk" : null),
                                                        (isWindy && (job.type === 'Pergola' || (job.type === 'Screen' && job.elevation === '2nd Story')) ? "Wind Risk" : null),
                                                        (job.complexity === 'Complex' && !crew.isLead ? "Lead Req." : null),
                                                        builderRisk
                                                    ].filter(Boolean) : [];

                                                    const blockStyle = job ? getBlockStyles(job.value, risks.length > 0, job.isBuilder) : null;
                                                    const spanCount = job ? job.duration : 1;
                                                    const validSpan = Math.min(Math.max(spanCount, 1), 5);
                                                    const colSpanClass = ['col-span-1', 'col-span-2', 'col-span-3', 'col-span-4', 'col-span-5'][validSpan - 1];
                                                    const isDragOver = dragOverCell === `${crew.id}-${dayIdx}`;

                                                    return (
                                                        <div
                                                            key={day}
                                                            className={`p-2 relative group flex items-stretch ${colSpanClass}`}
                                                            onDragOver={(e) => { e.preventDefault(); setDragOverCell(`${crew.id}-${dayIdx}`); }}
                                                            onDragLeave={() => setDragOverCell(null)}
                                                            onDrop={(e) => handleDrop(e, crew.id, dayIdx)}
                                                        >
                                                            {job ? (
                                                                <div
                                                                    draggable={true}
                                                                    onDragStart={(e) => handleDragStartBoard(e, job, crew.id, dayIdx)}
                                                                    onDragEnd={handleDragEnd}
                                                                    className={`w-full border-2 rounded-2xl shadow-sm flex flex-col justify-start transition-all relative overflow-hidden ${blockStyle.bg} ${draggedItem?.job?.id === job.id ? 'opacity-40 scale-95' : 'opacity-100 hover:shadow-md'}`}
                                                                >
                                                                    <div className="absolute inset-0 opacity-[0.04]" style={{ backgroundImage: 'repeating-linear-gradient(45deg, #000 0, #000 1px, transparent 0, transparent 50%)', backgroundSize: '8px 8px' }}></div>
                                                                    <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${blockStyle.accent}`} />
                                                                    <div className="p-3 pl-4 relative z-10 flex flex-col h-full text-slate-900">
                                                                        <div className="flex justify-between items-start gap-2">
                                                                            <div className="flex-1 min-w-0 text-slate-900">
                                                                                <span className={`font-black text-[11px] uppercase leading-tight block ${spanCount === 1 ? 'truncate' : 'line-clamp-2'} ${blockStyle.text}`}>{job.name}</span>
                                                                                {job.address && <button onClick={(e) => { e.stopPropagation(); openInMaps(job.address); }} className={`text-[9px] font-bold mt-1 flex items-start gap-1 hover:underline text-left uppercase tracking-tighter ${blockStyle.lightText}`}><MapPin size={10} className="shrink-0 mt-0.5" /> <span className={spanCount === 1 ? 'truncate' : 'whitespace-normal line-clamp-2'}>{job.address}</span></button>}
                                                                            </div>
                                                                            <button onClick={(e) => { e.stopPropagation(); removeFromSchedule(job.id); }} className={`${blockStyle.lightText} hover:text-red-600 rounded-md transition-colors p-1`} title="Remove from Board"><X size={14} /></button>
                                                                        </div>
                                                                        <div className="mt-2 flex flex-wrap gap-1.5 items-center">
                                                                            <div className={`inline-block px-2 py-0.5 rounded-md text-[11px] font-black border ${getValueShading(job.value)}`}>${job.value.toLocaleString()}</div>
                                                                            {risks.map((risk, idx) => <div key={idx} className="flex items-center gap-1 text-[9px] text-red-700 font-black px-1.5 py-0.5 bg-red-100 rounded uppercase border border-red-200"><AlertTriangle size={10} /> {risk}</div>)}
                                                                            {risks.length === 0 && <div className="flex items-center gap-1 text-[9px] font-black text-emerald-700 uppercase tracking-tighter bg-emerald-100 px-1.5 py-0.5 rounded border border-emerald-200"><CheckCircle size={10} /> Ready</div>}
                                                                        </div>
                                                                        <div className={`absolute bottom-2 right-2 text-white text-[10px] font-black px-2 py-0.5 rounded-full shadow-sm ${blockStyle.accent}`}>{job.duration}D</div>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <button onClick={() => handleSlotClick(crew.id, dayIdx)} disabled={!activeSelection && !draggedItem} className={`w-full rounded-2xl border-2 border-dashed flex items-center justify-center transition-all ${isDragOver ? 'border-blue-500 bg-blue-100/50 scale-[1.02]' : (activeSelection || draggedItem) ? 'border-blue-300 bg-blue-50/30 hover:bg-blue-100' : 'border-slate-200 bg-slate-50/50 hover:bg-slate-100 cursor-default'}`}><Plus size={24} className={isDragOver ? 'text-blue-600' : (activeSelection || draggedItem) ? 'text-blue-400' : 'text-slate-300'} /></button>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MODALS */}
                    {showImportModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4" onClick={() => setShowImportModal(false)}>
                            <div className="bg-white rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden border border-slate-300 flex flex-col text-slate-900" onClick={e => e.stopPropagation()}>
                                <div className="p-5 bg-emerald-700 text-white flex justify-between items-center relative">
                                    <h2 className="font-black text-lg uppercase tracking-tighter flex items-center gap-2 font-mono tracking-tight"><FileText size={20} /> Bulk Import BuilderTrend Data</h2>
                                    <button onClick={() => setShowImportModal(false)} className="absolute right-4 top-4 p-2 bg-emerald-800 hover:bg-emerald-900 rounded-full text-white shadow-md transition-colors border border-emerald-600"><X size={20} /></button>
                                </div>
                                <div className="p-6 flex flex-col gap-4 text-slate-900">
                                    <div className="bg-slate-50 border border-slate-200 p-4 rounded-xl">
                                        <p className="text-xs font-bold text-slate-600 mb-2">Instructions:</p>
                                        <p className="text-xs text-slate-500 mb-3">Copy rows directly from your BuilderTrend export and paste them here. Columns must be separated by tabs (standard for Excel/Sheets).</p>
                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 font-mono">Order: Name | Value | Days | Type | Region | Address | Complexity | Builder Account</div>
                                    </div>
                                    <textarea className="w-full h-48 p-4 bg-slate-100 border-2 border-slate-200 rounded-xl font-mono text-xs focus:border-emerald-500 outline-none text-slate-900" placeholder="Paste tab-separated rows here..." value={importText} onChange={(e) => setImportText(e.target.value)} />
                                    <div className="flex gap-3">
                                        <button onClick={() => setShowImportModal(false)} className="flex-1 bg-slate-100 p-4 rounded-xl font-black uppercase tracking-widest hover:bg-slate-200 tracking-tight">Cancel</button>
                                        <button onClick={handleBulkImport} className="flex-1 bg-emerald-600 text-white p-4 rounded-xl font-black uppercase tracking-widest shadow-lg hover:bg-emerald-700 tracking-tight">Process Import</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4" onClick={() => setShowAddModal(false)}>
                            <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden border border-slate-300 text-slate-900" onClick={e => e.stopPropagation()}>
                                <div className="p-5 bg-slate-800 text-white flex justify-between items-center relative">
                                    <h2 className="font-black text-lg uppercase tracking-tighter">New Job Entry</h2>
                                    <button onClick={() => setShowAddModal(false)} className="absolute right-4 top-4 p-2 bg-slate-700 hover:bg-slate-900 rounded-full text-white shadow-md transition-colors border border-slate-600"><X size={20} /></button>
                                </div>
                                <form onSubmit={handleAddJob} className="p-5 space-y-3 max-h-[80vh] overflow-y-auto">
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400">Client Name</label>
                                        <input required className="w-full p-3 bg-slate-100 border-2 border-slate-100 rounded-xl mt-1 font-bold focus:border-blue-500 outline-none" value={newJob.name} onChange={e => setNewJob({ ...newJob, name: e.target.value })} placeholder="e.g. Miller Residence" />
                                    </div>
                                    <div className="relative" ref={suggestionRef}>
                                        <label className="text-[10px] font-black uppercase text-slate-400">Job Address</label>
                                        <div className="relative">
                                            <input required className="w-full p-3 pr-10 bg-slate-100 border-2 border-slate-100 rounded-xl mt-1 font-bold focus:border-blue-500 outline-none" value={newJob.address} onChange={handleAddressChange} placeholder="Street, City, Zip" autoComplete="off" />
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                                                {isSearching ? <Loader2 size={16} className="animate-spin" /> : <Search size={16} />}
                                            </div>
                                        </div>
                                        {showSuggestions && suggestions.length > 0 && (
                                            <div className="absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden max-h-48 overflow-y-auto">
                                                {suggestions.map((s, i) => (
                                                    <button key={i} type="button" onClick={() => selectSuggestion(s)} className="w-full text-left p-3 text-xs font-bold hover:bg-blue-50 border-b border-slate-100 last:border-none text-slate-700 flex items-center gap-2">
                                                        <MapPin size={12} className="text-blue-500 shrink-0" /><span className="truncate">{s}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 text-slate-900">
                                        <div><label className="text-[10px] font-black uppercase text-slate-400">Value ($)</label><input required type="number" className="w-full p-3 bg-slate-100 border-2 border-slate-100 rounded-xl mt-1 font-bold outline-none" value={newJob.value} onChange={e => setNewJob({ ...newJob, value: e.target.value })} /></div>
                                        <div><label className="text-[10px] font-black uppercase text-slate-400">Days</label><select className="w-full p-3 bg-slate-100 border-2 border-slate-100 rounded-xl mt-1 font-bold outline-none text-slate-900" value={newJob.duration} onChange={e => setNewJob({ ...newJob, duration: parseInt(e.target.value) })}>{[1, 2, 3, 4, 5].map(d => <option key={d} value={d}>{d} Day{d > 1 ? 's' : ''}</option>)}</select></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 text-slate-900">
                                        <div><label className="text-[10px] font-black uppercase text-slate-400">Job Type</label><select className="w-full p-3 bg-slate-100 border-2 border-slate-100 rounded-xl mt-1 font-bold outline-none text-slate-900" value={newJob.type} onChange={e => setNewJob({ ...newJob, type: e.target.value })}><option value="USI">USI</option><option value="Screen">Screen</option><option value="Pergola">Pergola</option><option value="Shades">Shades</option></select></div>
                                        <div><label className="text-[10px] font-black uppercase text-slate-400">Complexity</label><select className="w-full p-3 bg-slate-100 border-2 border-slate-100 rounded-xl mt-1 font-bold outline-none text-slate-900" value={newJob.complexity} onChange={e => setNewJob({ ...newJob, complexity: e.target.value })}><option value="Standard">Standard</option><option value="Complex">Complex (Lead Req)</option></select></div>
                                    </div>
                                    <div className="pt-2 space-y-2 text-slate-900">
                                        <label className="flex items-center gap-3 cursor-pointer bg-slate-50 p-2.5 rounded-xl border border-slate-200">
                                            <input type="checkbox" checked={newJob.isBuilder} onChange={e => setNewJob({ ...newJob, isBuilder: e.target.checked })} className="w-4 h-4 rounded text-blue-600" />
                                            <span className="text-[10px] font-black uppercase text-slate-600">Builder/Contractor Account</span>
                                        </label>
                                        <div className="bg-blue-50 border border-blue-200 p-3 rounded-xl space-y-2 text-slate-800">
                                            <div className="text-[9px] font-black uppercase text-blue-600 flex items-center gap-1 tracking-wider"><CheckSquare size={12} /> SOP Verification</div>
                                            <label className="flex items-center gap-3 cursor-pointer">
                                                <input type="checkbox" required checked={newJob.materialsReady} onChange={e => setNewJob({ ...newJob, materialsReady: e.target.checked })} className="w-4 h-4 rounded text-blue-600" />
                                                <span className="text-[10px] font-bold">100% Materials Verified On-Hand</span>
                                            </label>
                                            {newJob.isBuilder && (
                                                <label className="flex items-center gap-3 cursor-pointer">
                                                    <input type="checkbox" required checked={newJob.siteReady} onChange={e => setNewJob({ ...newJob, siteReady: e.target.checked })} className="w-4 h-4 rounded text-blue-600" />
                                                    <span className="text-[10px] font-bold">Site Readiness Complete (Elec/Concrete)</span>
                                                </label>
                                            )}
                                        </div>
                                    </div>
                                    <button type="submit" className={`w-full text-white p-4 rounded-xl font-black uppercase tracking-widest shadow-lg transition-all ${(!newJob.materialsReady || (newJob.isBuilder && !newJob.siteReady)) ? 'bg-slate-300' : 'bg-blue-600 hover:bg-blue-700'}`}>Add to Backlog</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {activeSelection && (
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-5 rounded-full shadow-2xl flex items-center gap-8 z-40 animate-bounce-slow border-t-4 border-blue-500">
                            <div className="flex flex-col"><span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Placing Job</span><span className="font-black text-sm uppercase tracking-tight">{activeSelection.name} ({activeSelection.duration} Days)</span></div>
                            <div className="h-10 w-px bg-slate-700" />
                            <span className="text-xs font-bold text-blue-400 italic">Click a starting "+" to schedule</span>
                            <button onClick={() => setActiveSelection(null)} className="bg-slate-800 hover:bg-red-600 p-2 rounded-full transition-colors"><X size={18} /></button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
